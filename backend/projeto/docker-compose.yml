version: "3.9"

services:
  api:
    build: .
    container_name: backend_api
    command: python projeto/app.py
    ports:
      - "5000:5000"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
    volumes:
      - .:/app

  worker:
    build: .
    container_name: backend_worker
    command: python -m rq worker os_eventos
    depends_on:
      - redis
    environment:
    - REDIS_HOST=redis
    - PYTHONPATH=/app
    volumes:
      - .:/app

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"